<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a3a6b" />
    <meta name="description" content="Wollo University Academic Portal - Official academic policies, regulations, and information" />
    <link rel="manifest" href="/manifest.json" />
    <title>Wollo University Academic Portal</title>
    <style>
      /* Hide Google Translate banner completely */
      .goog-te-banner-frame { display: none !important; }
      body { top: 0 !important; }
      #goog-gt-tt, .goog-te-balloon-frame, .goog-tooltip { display: none !important; }
      .goog-te-menu-value span { color: #fff !important; }
    </style>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,am,om,ti,so',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element" style="display:none;"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
